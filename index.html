<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Premium Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2eb857;
            --primary-light: #4ade80;
            --primary-glow: rgba(46, 184, 87, 0.3);
            --danger: #ff4d4d;
            --bg-dark: #080808;
            --card-glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navbar & Logo --- */
        .navbar {
            backdrop-filter: blur(25px);
            background: rgba(0,0,0,0.7);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(46, 184, 87, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; display: flex; align-items: center; }
        .logo-green { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); margin-left: 5px; }

        .discord-glow {
            height: 38px; cursor: pointer; transition: var(--transition);
            filter: drop-shadow(0 0 10px #7289da);
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 5px #7289da); transform: scale(1); }
            to { filter: drop-shadow(0 0 18px #7289da); transform: scale(1.08); }
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; left: -320px; top: 0; width: 300px; height: 100vh;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(40px);
            transition: var(--transition); z-index: 2000; padding-top: 80px;
            border-right: 2px solid var(--primary);
        }
        .sidebar.open { left: 0; box-shadow: 30px 0 60px rgba(0,0,0,0.9); }
        [dir="rtl"] .sidebar { left: auto; right: -320px; border-right: none; border-left: 2px solid var(--primary); }
        [dir="rtl"] .sidebar.open { right: 0; left: auto; }

        .sidebar-item {
            padding: 18px 30px; margin: 8px 15px; border-radius: 15px;
            color: #ccc; transition: var(--transition); cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-weight: 500;
        }
        .sidebar-item:hover { background: var(--primary-glow); color: var(--primary-light); transform: translateX(10px); }

        /* --- Loading System --- */
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #000;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.5s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .load-bar-bg { width: 220px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .load-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }

        /* --- Language Popup --- */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9);
            z-index: 3000; display: flex; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: #121212; padding: 40px; border-radius: 35px; border: 1px solid var(--primary);
            text-align: center; width: 90%; max-width: 420px; transform: scale(0.85); transition: 0.3s;
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        /* --- UI Components --- */
        .container { padding: 50px 5%; max-width: 1350px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; margin-top: 50px; }
        
        .item-card {
            background: var(--card-glass); backdrop-filter: blur(20px); border-radius: 35px;
            padding: 28px; border: 1px solid rgba(255,255,255,0.08); transition: var(--transition);
            display: flex; flex-direction: column; position: relative;
        }
        .item-card:hover { transform: translateY(-12px); border-color: var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .item-card img { width: 100%; height: 210px; object-fit: cover; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .btn {
            background: linear-gradient(135deg, var(--primary), #1e7a3a);
            color: white; border: none; padding: 16px; border-radius: 18px;
            cursor: pointer; width: 100%; font-weight: 800; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { box-shadow: 0 0 25px var(--primary-glow); transform: translateY(-3px); filter: brightness(1.1); }

        .price-tag { background: rgba(46, 184, 87, 0.1); color: var(--primary-light); padding: 6px 14px; border-radius: 12px; font-weight: 900; border: 1px solid var(--primary-glow); }
        input, textarea, select { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .get-counter { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 600; color: var(--primary-light); opacity: 0.8; letter-spacing: 0.5px; }
        
        .hidden { display: none !important; }
        .panel { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <h1 class="nav-logo">DIRT<span class="logo-green">STORE</span></h1>
        <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar"></div></div>
    </div>

    <div class="modal-overlay" id="langModal">
        <div class="modal-card">
            <h2 style="margin-top:0; font-size: 1.8rem;">Pick Language</h2>
            <div style="display:grid; gap: 15px; margin-top: 35px;">
                <button class="btn" onclick="setLang('en')">English (Global)</button>
                <button class="btn" onclick="setLang('ar')">العربية (الافتراضية)</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-logo">
            <span id="openBtn" style="cursor:pointer; margin-right: 15px;">☰</span>
            DIRT<span class="logo-green">STORE</span>
        </div>
        <img src="dis.png" class="discord-glow" onclick="window.open('https://discord.gg/NBXEbp67C', '_blank')">
    </nav>

    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; text-align: right;"><span id="closeBtn" style="cursor:pointer; font-size: 24px; opacity: 0.5;">✕</span></div>
        <div class="sidebar-item" onclick="navTo('secStore')">🏠 <span data-i18n="nav_store">Store Home</span></div>
        <div class="sidebar-item hidden" id="navUpload" onclick="navTo('secUpload')">📤 <span data-i18n="nav_upload">Publish Item</span></div>
        <div class="sidebar-item hidden" id="navManage" onclick="navTo('secManage')">⚙️ <span data-i18n="nav_manage">Admin Panel</span></div>
        <div class="sidebar-item" id="navLogin" onclick="navTo('secLogin')">🔑 <span data-i18n="nav_login">Staff Login</span></div>
        <div class="sidebar-item" onclick="openLangModal()">🌐 <span data-i18n="nav_lang">Language</span></div>
        <div class="sidebar-item hidden" id="btnLogout" style="color:var(--danger); margin-top: 40px;">Sign Out</div>
    </div>

    <div class="container">
        <div id="secStore" class="section-view">
            <div style="text-align:center; margin-bottom: 60px;">
                <h1 style="font-size: 3.5rem; margin:0; font-weight: 800;" data-i18n="market_title">Marketplace</h1>
                <p style="opacity:0.5; font-size: 1.1rem;" data-i18n="market_subtitle">Premium Content for DirtMC Community</p>
                <div style="max-width: 600px; margin: 40px auto;">
                    <input type="text" id="mainSearch" data-i18n="search_ph" placeholder="Search for premium assets...">
                </div>
            </div>
            <div class="grid" id="marketGrid"></div>
        </div>

        <div id="secLogin" class="section-view hidden">
            <div class="panel" style="max-width: 450px; margin: 60px auto;">
                <h2 style="text-align:center; font-size: 2rem;">Staff Portal</h2>
                <input type="email" id="emailInp" placeholder="Developer Email">
                <input type="password" id="passInp" placeholder="Access Key">
                <button class="btn" id="doLogin">Enter Dashboard</button>
            </div>
        </div>

        <div id="secManage" class="section-view hidden">
            <div class="panel">
                <h2>Admin Management</h2>
                <div id="adminRows"></div>
                <hr style="opacity:0.1; margin: 30px 0;">
                <h3>Hire New Staff</h3>
                <input type="email" id="admEmail" placeholder="New Email">
                <input type="password" id="admPass" placeholder="Password">
                <button class="btn" id="doAddAdmin">Create Admin</button>
            </div>
        </div>

        <div id="secUpload" class="section-view hidden">
            <div class="panel">
                <div id="listView">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                        <h2 style="margin:0;">Control Panel</h2>
                        <button class="btn" style="width:auto; padding: 12px 25px;" onclick="toggleCreate(true)">+ Create Product</button>
                    </div>
                    <div id="myProductsList"></div>
                </div>
                <div id="createView" class="hidden">
                    <button class="btn" style="width:auto; margin-bottom:30px; background: #222;" onclick="toggleCreate(false)">⬅ Back</button>
                    <h2>New Premium Asset</h2>
                    <select id="assetType" onchange="adjustUploadForm(this.value)">
                        <option value="photo">Direct Image</option>
                        <option value="code">Skript/Code Paste</option>
                        <option value="schematic">Minecraft Schematic</option>
                        <option value="file">Zip/Plugin File</option>
                    </select>
                    <input type="text" id="assetName" placeholder="Product Title">
                    <input type="number" id="assetPrice" placeholder="Price (0 = Free)">
                    <input type="text" id="assetImg" placeholder="Thumbnail URL">
                    <textarea id="assetCode" class="hidden" rows="6" placeholder="Paste Code Content..."></textarea>
                    <input type="file" id="assetFile" class="hidden">
                    <button class="btn" id="doPublish">Deploy Now</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const supabase = createClient('https://nimidighcuwhsiuyuftg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40');

        let currentLang = localStorage.getItem('dirt_lang') || 'en';
        let products = [];

        const i18n = {
            en: { nav_store: "Home", nav_upload: "Publish", nav_manage: "Admin", nav_login: "Login", nav_lang: "اللغة", market_title: "Marketplace", market_subtitle: "Exclusive digital assets", search_ph: "Search products...", free: "FREE", get_now: "Get Now", get_count: "people got this" },
            ar: { nav_store: "الرئيسية", nav_upload: "نشر", nav_manage: "الإدارة", nav_login: "دخول", nav_lang: "Language", market_title: "المتجر", market_subtitle: "إضافات رقمية حصرية", search_ph: "ابحث عن السلع...", free: "مجاناً", get_now: "احصل عليه", get_count: "شخص حصل عليه" }
        };

        // --- Core UI Functions ---
        window.openLangModal = () => document.getElementById('langModal').classList.add('active');
        
        window.setLang = (l) => {
            document.getElementById('langModal').classList.remove('active');
            triggerLoading(() => {
                currentLang = l;
                localStorage.setItem('dirt_lang', l);
                applyLang();
            });
        };

        function triggerLoading(callback) {
            const overlay = document.getElementById('loader');
            const bar = document.getElementById('loadBar');
            overlay.classList.add('active');
            bar.style.width = '0%';
            let w = 0;
            const interval = setInterval(() => {
                w += 20;
                bar.style.width = w + '%';
                if(w >= 100) {
                    clearInterval(interval);
                    setTimeout(() => { callback(); overlay.classList.remove('active'); }, 300);
                }
            }, 60);
        }

        function applyLang() {
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
            renderMarket();
        }

        window.navTo = (id) => {
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        document.getElementById('openBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('closeBtn').onclick = () => document.getElementById('sidebar').classList.remove('open');

        // --- Auth & Product Data ---
        onAuthStateChanged(auth, user => {
            ['navUpload', 'navManage', 'btnLogout'].forEach(id => document.getElementById(id).classList.toggle('hidden', !user));
            document.getElementById('navLogin').classList.toggle('hidden', !!user);
            if(user) fetchAdmins();
        });

        async function fetchAdmins() {
            onSnapshot(collection(db, "admins"), snap => {
                const container = document.getElementById('adminRows');
                container.innerHTML = "";
                snap.forEach(a => {
                    container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; background:rgba(255,255,255,0.03); margin-top:8px; border-radius:12px; border:1px solid rgba(255,255,255,0.05);">
                        <span>${a.data().email}</span>
                        <button onclick="delAdmin('${a.id}')" style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:bold;">Revoke</button>
                    </div>`;
                });
            });
        }

        window.delAdmin = async (id) => { if(confirm("Revoke admin access?")) await deleteDoc(doc(db, "admins", id)); };

        document.getElementById('doLogin').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('emailInp').value, document.getElementById('passInp').value); navTo('secStore'); }
            catch(e) { alert("Access Denied"); }
        };
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        // --- Upload Logic ---
        window.toggleCreate = (show) => {
            document.getElementById('listView').classList.toggle('hidden', show);
            document.getElementById('createView').classList.toggle('hidden', !show);
        };

        window.adjustUploadForm = (v) => {
            document.getElementById('assetCode').classList.toggle('hidden', v !== 'code');
            document.getElementById('assetFile').classList.toggle('hidden', v === 'code' || v === 'photo');
        };

        document.getElementById('doPublish').onclick = async () => {
            const name = document.getElementById('assetName').value;
            const price = document.getElementById('assetPrice').value;
            const img = document.getElementById('assetImg').value;
            const type = document.getElementById('assetType').value;
            const code = document.getElementById('assetCode').value;
            const file = document.getElementById('assetFile').files[0];
            if(!name) return alert("Title is mandatory");

            triggerLoading(async () => {
                let fUrl = ""; let fPath = "";
                if(file && type !== 'code' && type !== 'photo') {
                    fPath = `assets/${Date.now()}_${file.name}`;
                    await supabase.storage.from('dirt-assets').upload(fPath, file);
                    fUrl = (await supabase.storage.from('dirt-assets').getPublicUrl(fPath)).data.publicUrl;
                }
                await addDoc(collection(db, "products"), {
                    name, price: Number(price), type, img, codeData: code, file: fUrl, filePath: fPath, downloads: 0, createdAt: new Date()
                });
                toggleCreate(false);
            });
        };

        // --- Render Marketplace ---
        function renderMarket() {
            const grid = document.getElementById('marketGrid');
            const myContainer = document.getElementById('myProductsList');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = ""; if(myContainer) myContainer.innerHTML = "";

            products.forEach(p => {
                if(auth.currentUser && myContainer) {
                    myContainer.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:rgba(0,0,0,0.3); margin-top:8px; border-radius:15px; border:1px solid rgba(255,255,255,0.05);">
                        <span>${p.name}</span>
                        <button onclick="delProduct('${p.id}', '${p.filePath}')" style="color:var(--danger); border:none; background:none; cursor:pointer;">Delete</button>
                    </div>`;
                }

                if(p.name.toLowerCase().includes(search)) {
                    const priceVal = p.price == 0 ? i18n[currentLang].free : '$'+p.price;
                    grid.innerHTML += `
                        <div class="item-card">
                            ${p.img ? `<img src="${p.img}">` : `<div style="height:210px; background:#111; border-radius:25px; display:flex; align-items:center; justify-content:center; color:#444;">No Preview</div>`}
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <h3 style="margin:0; font-size:1.3rem;">${p.name}</h3>
                                <span class="price-tag">${priceVal}</span>
                            </div>
                            <button class="btn" onclick="handleDownload('${p.id}', '${p.file}', '${p.type}', '${encodeURIComponent(p.codeData || '')}')">
                                ${i18n[currentLang].get_now}
                            </button>
                            <div class="get-counter">✨ ${p.downloads || 0} ${i18n[currentLang].get_count}</div>
                        </div>`;
                }
            });
        }

        // --- Unique Download Handler (Anti-Spam) ---
        window.handleDownload = async (id, url, type, code) => {
            const storageKey = `got_${id}`;
            const hasDownloaded = localStorage.getItem(storageKey);

            if(!hasDownloaded) {
                // First time: increment counter in DB and save to local storage
                await updateDoc(doc(db, "products", id), { downloads: increment(1) });
                localStorage.setItem(storageKey, "true");
            }

            // Perform Action
            if(type === 'code') {
                navigator.clipboard.writeText(decodeURIComponent(code));
                alert(currentLang === 'ar' ? "تم نسخ الكود!" : "Code copied to clipboard!");
            } else {
                window.open(url, '_blank');
            }
        };

        window.delProduct = async (id, path) => { if(confirm("Permanent Delete?")) { await deleteDoc(doc(db, "products", id)); if(path) await supabase.storage.from('dirt-assets').remove([path]); } };

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), snap => {
            products = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderMarket();
        });

        document.getElementById('mainSearch').oninput = renderMarket;
        applyLang();
    </script>
</body>
</html>
