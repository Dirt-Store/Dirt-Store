<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #0b1a0e;
            --medium-green: #1e3d24;
            --light-green: #5cb85c;
            --black: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Cairo', sans-serif;
            background-color: var(--black);
            overflow: hidden;
        }

        /* الخلفية المتدرجة الاحترافية */
        .main-wrapper {
            height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, var(--medium-green) 0%, var(--black) 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* شريط الحالة العلوي (Header) */
        header {
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* تدرج اسم Dirt */
        .logo-dirt {
            background: linear-gradient(to bottom, #81c784, #2d5a27);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* كلمة Store باللون الأبيض */
        .logo-store {
            color: #ffffff;
            margin-right: 10px;
        }

        /* محتوى المنتصف */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .soon-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 0;
            opacity: 0.9;
            /* تأثير إضاءة خلف النص */
            text-shadow: 0 0 50px rgba(92, 184, 92, 0.3);
            animation: fadeInOut 3s ease-in-out infinite;
        }

        .subtitle {
            color: var(--light-green);
            font-size: 1.5rem;
            margin-top: -20px;
            letter-spacing: 5px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* أنيميشن ناعم للعنوان */
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; transform: scale(0.98); filter: blur(2px); }
            50% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        /* تأثيرات الإضاءة في الخلفية */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--light-green);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: 1;
            pointer-events: none;
        }

        .glow-1 { top: 10%; left: 10%; }
        .glow-2 { bottom: 10%; right: 10%; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <header>
            <div class="logo">
                <span class="logo-dirt">DIRT</span><span class="logo-store">STORE</span>
            </div>
        </header>

        <main class="hero-section">
            <h1 class="soon-title">Soon</h1>
            <p class="subtitle">انتظروا الإطلاق الكبير</p>
        </main>
    </div>

</body>
</html>
