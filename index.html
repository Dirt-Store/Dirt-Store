<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store Pro</title>
    <style>
        :root {
            --primary: rgb(46, 139, 87);
            --danger: rgb(220, 53, 69);
            --bg: rgb(26, 26, 26);
            --card: rgb(45, 45, 45);
            --text: rgb(244, 244, 244);
            --nav-bg: rgb(35, 35, 35);
            --border: rgb(68, 68, 68);
        }

        [data-theme="light"] {
            --bg: rgb(245, 245, 245);
            --card: rgb(255, 255, 255);
            --text: rgb(30, 30, 30);
            --nav-bg: rgb(220, 220, 220);
            --border: rgb(200, 200, 200);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        .navbar {
            background: var(--nav-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }
        .theme-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 250px;
            height: 100vh;
            background: var(--card);
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
            padding-top: 60px;
            border-right: 1px solid var(--border);
        }

        .sidebar.open { left: 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }
        .sidebar-item { padding: 15px 20px; display: block; color: var(--text); text-decoration: none; font-size: 18px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .sidebar-item:hover { background: var(--nav-bg); }

        .container { padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        .panel {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .item-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        
        #uploadStatus { font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="menu-btn" id="openMenu">☰</button>
        <h2 style="margin:0;">Dirt Store</h2>
        <button class="theme-btn" id="toggleTheme">Theme</button>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeMenu">×</button>
        <div class="sidebar-item" id="btnGoStore">Store Home</div>
        <div class="sidebar-item hidden" id="btnGoAdmin">Admin Upload</div>
        <div class="sidebar-item" id="btnGoLogin">Login</div>
        <div class="sidebar-item hidden" id="btnLogOut">Logout</div>
    </div>

    <div class="container">
        
        <div id="secLogin" class="panel hidden">
            <h3>Admin Login</h3>
            <input type="email" id="logEmail" placeholder="Admin Email">
            <input type="password" id="logPass" placeholder="Password">
            <button class="btn" id="btnLoginAction">Sign In</button>
        </div>

        <div id="secUpload" class="panel hidden">
            <h3>Upload New Product</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (USD)">
            <p style="text-align:left; font-size:13px; margin:10px 0 0 5px;">Product Image:</p>
            <input type="file" id="pImg" accept="image/*">
            <p style="text-align:left; font-size:13px; margin:10px 0 0 5px;">Product File (.schem / .zip):</p>
            <input type="file" id="pFile">
            <button class="btn" id="btnStartUpload">Upload to Server</button>
            <div id="uploadStatus"></div>
        </div>

        <div id="secStore">
            <h2 id="storeTitle">Store Gallery</h2>
            <div class="grid" id="productGrid"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        let userAccount = null;

        // القائمة الجانبية والثيم
        const sidebar = document.getElementById('sidebar');
        document.getElementById('openMenu').onclick = () => sidebar.classList.add('open');
        document.getElementById('closeMenu').onclick = () => sidebar.classList.remove('open');
        document.getElementById('toggleTheme').onclick = () => {
            const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('dirt_theme', theme);
        };
        if(localStorage.getItem('dirt_theme') === 'light') document.body.setAttribute('data-theme', 'light');

        // التنقل بين الصفحات
        const showSec = (id) => {
            ['secLogin', 'secUpload', 'secStore'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            sidebar.classList.remove('open');
        };

        document.getElementById('btnGoStore').onclick = () => showSec('secStore');
        document.getElementById('btnGoAdmin').onclick = () => showSec('secUpload');
        document.getElementById('btnGoLogin').onclick = () => showSec('secLogin');
        document.getElementById('btnLogOut').onclick = () => signOut(auth);

        // مراقبة حالة تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            const adminNav = document.getElementById('btnGoAdmin');
            const loginNav = document.getElementById('btnGoLogin');
            const logoutNav = document.getElementById('btnLogOut');

            if (user) {
                userAccount = user;
                adminNav.classList.remove('hidden');
                logoutNav.classList.remove('hidden');
                loginNav.classList.add('hidden');
            } else {
                userAccount = null;
                adminNav.classList.add('hidden');
                logoutNav.classList.add('hidden');
                loginNav.classList.remove('hidden');
                showSec('secStore');
            }
        });

        // تسجيل الدخول
        document.getElementById('btnLoginAction').onclick = async () => {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("Welcome Back, Owner!");
                showSec('secUpload');
            } catch (err) { alert("Error: " + err.message); }
        };

        // الرفع للسيرفر
        document.getElementById('btnStartUpload').onclick = async () => {
            if(!userAccount) return;
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgFile = document.getElementById('pImg').files[0];
            const dataFile = document.getElementById('pFile').files[0];
            const status = document.getElementById('uploadStatus');

            if(!name || !imgFile || !dataFile) return alert("Fill all data first!");

            document.getElementById('btnStartUpload').disabled = true;

            try {
                const imgPath = `images/${Date.now()}_${imgFile.name}`;
                const imgRef = ref(storage, imgPath);
                await uploadBytesResumable(imgRef, imgFile);
                const imgUrl = await getDownloadURL(imgRef);

                const filePath = `files/${Date.now()}_${dataFile.name}`;
                const fileRef = ref(storage, filePath);
                const uploadTask = uploadBytesResumable(fileRef, dataFile);

                uploadTask.on('state_changed', 
                    (snap) => { status.innerText = `Uploading: ${Math.round((snap.bytesTransferred / snap.totalBytes) * 100)}%`; },
                    (err) => { throw err; },
                    async () => {
                        const fileUrl = await getDownloadURL(uploadTask.snapshot.ref);
                        await addDoc(collection(db, "products"), {
                            name, price, img: imgUrl, imgPath, file: fileUrl, filePath, createdAt: new Date()
                        });
                        alert("Product Published!");
                        location.reload();
                    }
                );
            } catch (err) { alert(err.message); document.getElementById('btnStartUpload').disabled = false; }
        };

        // حذف المنتج
        window.confirmDelete = async (id, iPath, fPath) => {
            if(!userAccount || !confirm("Delete this item permanently?")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                await deleteObject(ref(storage, iPath));
                await deleteObject(ref(storage, fPath));
            } catch (err) { console.log(err); }
        };

        // عرض المنتجات
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snap.forEach((d) => {
                const item = d.data();
                const id = d.id;
                grid.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}">
                        <h3>${item.name}</h3>
                        <p>Price: ${item.price}$</p>
                        <button class="btn" onclick="window.open('${item.file}')">Download</button>
                        ${userAccount ? `<button class="btn btn-danger" onclick="window.confirmDelete('${id}', '${item.imgPath}', '${item.filePath}')">Delete Item</button>` : ''}
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
