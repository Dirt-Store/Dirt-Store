<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store</title>
    <style>
        :root {
            --primary: #2eb857;
            --primary-glow: rgba(46, 184, 87, 0.4);
            --danger: #ff4d4d;
            --bg-dark: #0f0f0f;
            --card-glass: rgba(255, 255, 255, 0.06);
            --text: #f4f4f4;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --card-glass: rgba(0, 0, 0, 0.05);
            --text: #1a1a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            transition: var(--transition);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 5% 5%, var(--primary-glow) 0%, transparent 40%),
                        radial-gradient(circle at 95% 95%, var(--primary-glow) 0%, transparent 40%);
            pointer-events: none; z-index: -1;
        }

        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.4);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .theme-toggle { font-size: 26px; cursor: pointer; transition: var(--transition); user-select: none; }
        .theme-toggle:hover { transform: scale(1.2) rotate(15deg); }

        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100vh;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(25px);
            transition: var(--transition); z-index: 2000; padding-top: 80px;
            border-right: 2px solid var(--primary); overflow-y: auto;
        }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }

        .close-sidebar {
            position: absolute; top: 20px; right: 20px;
            font-size: 24px; cursor: pointer; color: var(--danger); transition: var(--transition);
        }
        .close-sidebar:hover { transform: scale(1.2) rotate(90deg); }

        [dir="rtl"] .sidebar { left: auto; right: -300px; border-right: none; border-left: 2px solid var(--primary); }
        [dir="rtl"] .sidebar.open { right: 0; left: auto; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        [dir="rtl"] .close-sidebar { right: auto; left: 20px; }

        .sidebar-item {
            padding: 18px 30px; margin: 10px 20px; border-radius: 100px;
            color: var(--text); transition: var(--transition); cursor: pointer;
            font-weight: 600; display: flex; align-items: center; gap: 15px;
        }
        .sidebar-item:hover { background: var(--primary); color: white; transform: translateX(15px); box-shadow: 0 10px 20px var(--primary-glow); }
        [dir="rtl"] .sidebar-item:hover { transform: translateX(-15px); }

        .lang-submenu {
            margin: 0 40px; border-left: 2px solid var(--primary); padding-left: 15px;
            display: none; flex-direction: column; gap: 10px;
        }
        .lang-submenu.active { display: flex; }
        [dir="rtl"] .lang-submenu { border-left: none; border-right: 2px solid var(--primary); padding-left: 0; padding-right: 15px; }

        .lang-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222222;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.5s ease;
        }
        .lang-modal.hidden { opacity: 0; pointer-events: none; }
        
        .lang-pill {
            background: var(--card-glass); border: 2px solid var(--primary);
            border-radius: 50px; padding: 15px 40px; font-size: 20px; font-weight: 800; color: white;
            cursor: pointer; transition: var(--transition); margin: 10px;
        }
        .lang-pill:hover { background: var(--primary); transform: translateY(-5px); }

        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f; z-index: 10001;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-bar-container { width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .loading-bar { height: 100%; background: var(--primary); width: 0%; }
        
        @keyframes loadAnim { 0% { width: 0%; } 100% { width: 100%; } }

        .container { padding: 50px 20px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
        .panel { background: var(--card-glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); max-width: 600px; margin: 40px auto; }
        input { width: 100%; padding: 16px 25px; margin: 15px 0; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px 30px; border-radius: 100px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; transition: var(--transition); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px var(--primary-glow); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .item-card { background: var(--card-glass); border-radius: 35px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); transition: var(--transition); display: flex; flex-direction: column; }
        .item-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 25px; margin-bottom: 20px; }
        .no-photo-card { text-align: center; padding: 40px 20px; background: rgba(0,0,0,0.3); border-radius: 25px; margin-bottom: 20px; border: 1px dashed var(--primary); }
        .hidden { display: none !important; }

        @keyframes dropToCart {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(100px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="langModal" class="lang-modal hidden">
        <div id="langButtonsBox">
            <button class="lang-pill" onclick="triggerCinematicLang('en', this)">🇺🇸 English</button>
            <button class="lang-pill" onclick="triggerCinematicLang('ar', this)">🇸🇦 العربية</button>
        </div>
        <div style="font-size: 80px; color: var(--primary); margin-top: 20px;">🛒</div>
    </div>

    <div id="loadingScreen" class="loading-screen hidden">
        <h1 style="color: white;">Dirt <span style="color:var(--primary)">Store</span></h1>
        <div class="loading-bar-container"><div class="loading-bar" id="lBar"></div></div>
    </div>

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="theme-toggle" id="openMenu">☰</div>
            <h2 style="margin:0; font-weight: 900;">Dirt <span style="color:var(--primary)">Store</span></h2>
        </div>
        <div class="theme-toggle" id="toggleTheme">☀</div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="close-sidebar" id="closeSidebar">✖</div>
        <div class="sidebar-item" id="navStore"><span data-i18n="nav_store">Store Home</span></div>
        <div class="sidebar-item hidden" id="navUpload"><span data-i18n="nav_upload">Publish Item</span></div>
        <div class="sidebar-item hidden" id="navManage"><span data-i18n="nav_manage">Admin Panel</span></div>
        <div class="sidebar-item" id="navLogin"><span data-i18n="nav_login">Staff Login</span></div>
        <div class="sidebar-item" onclick="document.getElementById('sidebarLangSubmenu').classList.toggle('active')">🌐 <span data-i18n="nav_lang">Language</span></div>
        <div class="lang-submenu" id="sidebarLangSubmenu">
            <span onclick="triggerLoadingAndSwitch('en')" style="cursor:pointer; padding: 5px 0;">English</span>
            <span onclick="triggerLoadingAndSwitch('ar')" style="cursor:pointer; padding: 5px 0;">العربية</span>
        </div>
        <div class="sidebar-item hidden" id="btnLogOut" style="color:var(--danger)"><span data-i18n="nav_logout">Sign Out</span></div>
    </div>

    <div class="container">
        <div id="secStore" class="section-view">
            <h1 data-i18n="market_title" style="text-align:center; font-size: 3rem;">Marketplace</h1>
            <p style="text-align:center; opacity:0.7;">
                <span data-i18n="total_visitors">Total Visitors:</span> <span id="globalVisitorCount">...</span>
            </p>
            <input type="text" id="searchInput" data-i18n="search_ph" placeholder="Search..." style="max-width:500px; display:block; margin: 20px auto;">
            <div class="grid" id="productGrid"></div>
        </div>

        <div id="secLogin" class="section-view hidden">
            <div class="panel">
                <h2 data-i18n="login_title" style="text-align:center;">Staff Authentication</h2>
                <input type="email" id="logEmail" placeholder="Email">
                <input type="password" id="logPass" placeholder="Password">
                <button class="btn" id="btnLoginAction" data-i18n="login_btn">Login</button>
            </div>
        </div>

        <div id="secManage" class="section-view hidden">
            <div class="panel">
                <h2 data-i18n="admin_title">Admin Management</h2>
                <div id="adminListContainer"></div>
                <hr>
                <input type="email" id="newAdminEmail" placeholder="Email">
                <input type="password" id="newAdminPass" placeholder="Password">
                <button class="btn" id="btnAddAdminAction" data-i18n="hire_btn">Add Admin</button>
            </div>
        </div>

        <div id="secUpload" class="section-view hidden">
            <div class="panel" style="max-width: 800px;">
                <h2 data-i18n="upload_title">Publish Item</h2>
                <input type="text" id="pName" placeholder="Product Name">
                <input type="number" id="pPrice" placeholder="Price (0 = Free)">
                <input type="file" id="pImgFile" accept="image/*">
                <input type="file" id="pFile">
                <button class="btn" id="btnStartUpload">Upload to Store</button>
                <div id="uploadStatus" style="margin-top:10px; color:var(--primary); text-align:center;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const supabase = createClient('https://nimidighcuwhsiuyuftg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40');

        let currentLang = 'en';

        const i18n = {
            en: {
                nav_store: "Store Home", nav_upload: "Publish Item", nav_manage: "Admin Panel",
                nav_login: "Staff Login", nav_lang: "Language", nav_logout: "Sign Out",
                market_title: "Marketplace", search_ph: "Search items...",
                login_title: "Staff Login", login_btn: "Secure Login",
                admin_title: "Admins", hire_btn: "Add New Admin",
                upload_title: "Add Product", get_it: "Download", free: "FREE", total_visitors: "Total Visitors:"
            },
            ar: {
                nav_store: "الرئيسية", nav_upload: "نشر سلعة", nav_manage: "لوحة التحكم",
                nav_login: "دخول الموظفين", nav_lang: "اللغة", nav_logout: "خروج",
                market_title: "المتجر", search_ph: "ابحث هنا...",
                login_title: "تسجيل دخول", login_btn: "دخول آمن",
                admin_title: "المشرفين", hire_btn: "إضافة مشرف",
                upload_title: "رفع ملف", get_it: "تحميل", free: "مجاناً", total_visitors: "إجمالي الزوار:"
            }
        };

        // --- iPhone Download Fix ---
        window.handleDownload = async (id, fileUrl) => {
            try {
                const downloadKey = 'dirt_dl_' + id;
                if (!localStorage.getItem(downloadKey)) {
                    const docRef = doc(db, "products", id);
                    await updateDoc(docRef, { downloads: increment(1) });
                    localStorage.setItem(downloadKey, 'true');
                }

                // Create a dynamic link for iOS compatibility
                const link = document.createElement('a');
                link.href = fileUrl;
                const fileName = fileUrl.split('/').pop().split('?')[0];
                link.setAttribute('download', fileName);
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                window.location.href = fileUrl;
            }
        };

        // --- Language & Cinematic logic ---
        window.applyLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('dirt_lang', lang);
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.tagName === 'INPUT' ? el.placeholder = i18n[lang][key] : el.innerText = i18n[lang][key];
            });
            renderStoreData();
        };

        window.triggerCinematicLang = (lang, btn) => {
            btn.style.animation = "dropToCart 0.8s forwards";
            setTimeout(() => {
                document.getElementById('langModal').classList.add('hidden');
                showLoadingScreen(() => applyLanguage(lang));
            }, 700);
        };

        window.triggerLoadingAndSwitch = (lang) => {
            document.getElementById('sidebar').classList.remove('open');
            showLoadingScreen(() => applyLanguage(lang));
        };

        const showLoadingScreen = (cb) => {
            const screen = document.getElementById('loadingScreen');
            const bar = document.getElementById('lBar');
            screen.classList.remove('hidden');
            bar.style.animation = 'loadAnim 1.5s forwards';
            setTimeout(cb, 500);
            setTimeout(() => { screen.classList.add('hidden'); bar.style.animation = 'none'; }, 1600);
        };

        // Start Up
        const savedLang = localStorage.getItem('dirt_lang');
        if (!savedLang) document.getElementById('langModal').classList.remove('hidden');
        else applyLanguage(savedLang);

        // Sidebar & Navigation
        document.getElementById('openMenu').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
        
        const showSection = (id) => {
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
        };

        document.getElementById('navStore').onclick = () => showSection('secStore');
        document.getElementById('navLogin').onclick = () => showSection('secLogin');
        document.getElementById('navUpload').onclick = () => showSection('secUpload');
        document.getElementById('navManage').onclick = () => showSection('secManage');

        // Stats & Auth
        onSnapshot(doc(db, "stats", "visitors"), snap => {
            if(snap.exists()) document.getElementById('globalVisitorCount').innerText = snap.data().count;
        });

        if(!localStorage.getItem('dirt_v')) {
            setDoc(doc(db, "stats", "visitors"), { count: increment(1) }, { merge: true });
            localStorage.setItem('dirt_v', '1');
        }

        onAuthStateChanged(auth, user => {
            document.getElementById('navUpload').classList.toggle('hidden', !user);
            document.getElementById('navManage').classList.toggle('hidden', !user);
            document.getElementById('btnLogOut').classList.toggle('hidden', !user);
            document.getElementById('navLogin').classList.toggle('hidden', !!user);
        });

        document.getElementById('btnLoginAction').onclick = async () => {
            try { 
                await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
                showSection('secStore');
            } catch(e) { alert("Error"); }
        };
        document.getElementById('btnLogOut').onclick = () => signOut(auth);

        // Uploading
        document.getElementById('btnStartUpload').onclick = async () => {
            const status = document.getElementById('uploadStatus');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgF = document.getElementById('pImgFile').files[0];
            const dataF = document.getElementById('pFile').files[0];

            if(!name || !dataF) return alert("Missing info");
            status.innerText = "Uploading...";

            try {
                let imgUrl = "";
                if(imgF) {
                    const iPath = `img_${Date.now()}`;
                    await supabase.storage.from('dirt-assets').upload(iPath, imgF);
                    imgUrl = supabase.storage.from('dirt-assets').getPublicUrl(iPath).data.publicUrl;
                }

                const dPath = `file_${Date.now()}`;
                await supabase.storage.from('dirt-assets').upload(dPath, dataF);
                const fileUrl = supabase.storage.from('dirt-assets').getPublicUrl(dPath).data.publicUrl;

                await addDoc(collection(db, "products"), {
                    name, price: Number(price), img: imgUrl, file: fileUrl, downloads: 0, createdAt: new Date()
                });
                alert("Done!");
                showSection('secStore');
            } catch(e) { alert("Failed"); }
            status.innerText = "";
        };

        // Rendering Store
        let products = [];
        const renderStoreData = () => {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";
            products.forEach(p => {
                if(p.name.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="item-card">
                            ${p.img ? `<img src="${p.img}">` : `<div class="no-photo-card"><h3>${p.name}</h3></div>`}
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3>${p.name}</h3>
                                <b style="color:var(--primary)">${p.price == 0 ? i18n[currentLang].free : '$'+p.price}</b>
                            </div>
                            <button class="btn" style="margin-top:auto;" onclick="window.handleDownload('${p.id}', '${p.file}')">
                                ${i18n[currentLang].get_it} (⬇️ ${p.downloads || 0})
                            </button>
                        </div>
                    `;
                }
            });
        };

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), snap => {
            products = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderStoreData();
        });

        document.getElementById('searchInput').oninput = renderStoreData;
        document.getElementById('toggleTheme').onclick = () => {
            const d = document.documentElement;
            const isDark = d.getAttribute('data-theme') === 'dark';
            d.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('toggleTheme').innerText = isDark ? '🌜' : '☀';
        };

    </script>
</body>
</html>
