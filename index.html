<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f4f4f4; --text: #333; --main: #2e8b57; --card: #fff; }
        body.dark-mode { --bg: #1a1a1a; --text: #f0f0f0; --card: #2d2d2d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--main); position: sticky; top: 0; z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .add-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--main); color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; display: none; overflow-y: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        .btn-save { background: var(--main); color: white; border: none; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body onload="init()">

    <header>
        <h2 style="margin:0; color:var(--main);">Dirt Store</h2>
        <button onclick="toggleDark()" style="background:none; border:none; font-size:20px;">🌓</button>
    </header>

    <div class="grid" id="productGrid">
        </div>

    <button class="add-btn" onclick="openModal()">+</button>

    <div id="addModal" class="modal">
        <h3>أرشفة منتج جديد</h3>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="text" id="pImg" placeholder="رابط الصورة (URL)">
        <button class="btn-save" id="saveBtn" onclick="saveToSupabase()">حفظ في الأرشيف</button>
        <button onclick="closeModal()" style="background:#888; color:white;">إلغاء</button>
    </div>

    <script>
        // إعدادات الربط الخاصة بك
        const SB_URL = "https://kdtujvpsscyovmzyvghw.supabase.co";
        const SB_KEY = "Sb_publishable__3K83DFvrxoNadCdBSbfig_ZpRi0DjV";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            if(localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');
            fetchProducts();
        }

        // جلب البيانات من السيرفر
        async function fetchProducts() {
            const { data, error } = await _supabase.from('products').select('*').order('id', { ascending: false });
            if (data) render(data);
        }

        function render(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <img src="${item.img || 'https://via.placeholder.com/150'}">
                    <h4>${item.name}</h4>
                    <p style="color:var(--main); font-weight:bold;">$${item.price}</p>
                </div>
            `).join('');
        }

        // حفظ البيانات في السيرفر
        async function saveToSupabase() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const btn = document.getElementById('saveBtn');

            if (!name) return alert("الرجاء كتابة الاسم");

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const { error } = await _supabase.from('products').insert([{ name, price, img }]);

            if (error) {
                alert("خطأ: " + error.message);
            } else {
                closeModal();
                fetchProducts();
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
            }
            btn.innerText = "حفظ في الأرشيف";
            btn.disabled = false;
        }

        function openModal() { document.getElementById('addModal').style.display = 'block'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }
        function toggleDark() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
        }
    </script>
</body>
</html>
